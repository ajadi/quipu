<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120"
     role="img" aria-label="Quipu — local-first memory for AI agents">
  <defs>
    <linearGradient id="cord" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C7D2FE"/>
      <stop offset="50%"  stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <rect width="420" height="120" rx="14" fill="#0E1015"/>

  <!-- ── QUIPU ICON ─────────────────────────────────────── -->

  <!-- Spine: main horizontal cord -->
  <line x1="20" y1="44" x2="82" y2="44"
    stroke="url(#cord)" stroke-width="5" stroke-linecap="round"/>

  <!-- Pendant 1 (leftmost) — medium length -->
  <line x1="30" y1="44" x2="30" y2="73"
    stroke="url(#cord)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="30" cy="78" r="4" fill="#818CF8"/>

  <!-- Pendant 2 (featured, amber) — longest -->
  <line x1="44" y1="44" x2="44" y2="80"
    stroke="url(#cord)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="44" cy="86" r="5.5" fill="#F59E0B"/>

  <!-- Pendant 3 — medium-short -->
  <line x1="58" y1="44" x2="58" y2="68"
    stroke="url(#cord)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="58" cy="73" r="4" fill="#818CF8"/>

  <!-- Pendant 4 (rightmost) — shortest -->
  <line x1="72" y1="44" x2="72" y2="60"
    stroke="url(#cord)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="72" cy="65" r="3.5" fill="#818CF8"/>

  <!-- ── WORDMARK ──────────────────────────────────────── -->
  <text
    x="98" y="65"
    font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#F0EDE8"
    letter-spacing="-0.5"
  >Quipu</text>

  <!-- ── TAGLINE ───────────────────────────────────────── -->
  <text
    x="99" y="88"
    font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#8A94A0"
    letter-spacing="0.4"
  >local-first memory for AI agents</text>
</svg>
