services:
  quipu-hub:
    build:
      context: ..
      dockerfile: hub/Dockerfile
    env_file:
      - ./hub.env          # HUB_TOKENS (required) + optional overrides
    ports:
      - "127.0.0.1:8000:8000"  # Localhost-only by default; TLS/proxy in front.
                                # For a proxy in a separate Docker network, change to
                                # "8000:8000" and isolate via a custom bridge network.
    volumes:
      - hub-db:/data        # hub.db persisted outside the container
      - hub-audit:/audit    # audit log persisted outside the container
    environment:
      HUB_DB_PATH: /data/hub.db
      HUB_AUDIT_PATH: /audit/audit.log
    restart: unless-stopped

volumes:
  hub-db:
  hub-audit:

# -----------------------------------------------------------------------
